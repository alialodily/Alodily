name: Build & Verify

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build Verification
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
        env:
          # API key not required for build (only at runtime via serverless fn)
          NODE_ENV: production

      - name: Verify build output
        run: |
          test -d dist || (echo "❌ dist/ directory missing" && exit 1)
          test -f dist/index.html || (echo "❌ dist/index.html missing" && exit 1)
          echo "✅ Build verified · dist/ size:"
          du -sh dist/

      - name: Check bundle size
        run: |
          MAIN_JS=$(find dist/assets -name "index-*.js" | head -1)
          if [ -n "$MAIN_JS" ]; then
            SIZE=$(stat -c%s "$MAIN_JS")
            SIZE_KB=$((SIZE / 1024))
            echo "Main bundle size: ${SIZE_KB}KB"
            if [ $SIZE_KB -gt 1500 ]; then
              echo "⚠️  Bundle size exceeds 1.5MB warning threshold"
            fi
          fi
